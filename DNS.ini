[custom]
; ============================================================
;  DNS.ini — 谨慎优化版 (2026-04-20)
;  原则：只改经过实测/逻辑验证的部分，不换 URL 镜像，保留所有原始可达性判断
; ============================================================

; ---------- 1. 广告拦截（前置，避免被 direct.txt 误判） ----------
ruleset=REJECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=REJECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list

; ---------- 2. 🤖 OPenAI（AI / LLM / Gemini） ----------
ruleset=🤖 OPenAI,[]DOMAIN-SUFFIX,chatboxai.app
ruleset=🤖 OPenAI,[]DOMAIN-SUFFIX,groq.com
ruleset=🤖 OPenAI,[]DOMAIN-SUFFIX,ai.com
ruleset=🤖 OPenAI,[]DOMAIN-SUFFIX,openai.com
ruleset=🤖 OPenAI,[]DOMAIN-SUFFIX,chatgpt.com
ruleset=🤖 OPenAI,[]DOMAIN-SUFFIX,oaiusercontent.com
ruleset=🤖 OPenAI,[]DOMAIN,openaiapi-site.azureedge.net
ruleset=🤖 OPenAI,[]DOMAIN,ai.google.dev
ruleset=🤖 OPenAI,[]DOMAIN,alkalimakersuite-pa.clients6.google.com
ruleset=🤖 OPenAI,[]DOMAIN,makersuite.google.com
ruleset=🤖 OPenAI,[]DOMAIN,bard.google.com
ruleset=🤖 OPenAI,[]DOMAIN,deepmind.com
ruleset=🤖 OPenAI,[]DOMAIN,deepmind.google
ruleset=🤖 OPenAI,[]DOMAIN,gemini.google.com
ruleset=🤖 OPenAI,[]DOMAIN,generativeai.google
ruleset=🤖 OPenAI,[]DOMAIN,proactivebackend-pa.googleapis.com
ruleset=🤖 OPenAI,[]DOMAIN,apis.google.com
ruleset=🤖 OPenAI,[]DOMAIN-KEYWORD,colab
ruleset=🤖 OPenAI,[]DOMAIN-KEYWORD,developerprofiles
ruleset=🤖 OPenAI,[]DOMAIN-KEYWORD,generativelanguage
; 移除：identrust.com / challenges.cloudflare.com / cdn.auth0.com
; 原因：IdenTrust 是 CA / CF Challenge / Auth0 是通用 OAuth，非 OpenAI 专属
;       放 AI 组会让所有用 CF Turnstile 的网站挤占该组流量

; ---------- 3. 🚀 节点选择（代理白名单） ----------
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,xn--ngstr-lra8j.com
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,x.keya.pw
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,922220.xyz
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,services.googleapis.cn
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,ipify.org
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,linux.do
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/GoogleCNProxyIP.list
; services.googleapis.cn 保留走代理：DNS 解析到 Google 美国 IP，国内大概率阻断

; ---------- 4. DIRECT 个人直连白名单 ----------
ruleset=DIRECT,[]DOMAIN-SUFFIX,icourse163.org
ruleset=DIRECT,[]DOMAIN-SUFFIX,51lss.com
ruleset=DIRECT,[]DOMAIN-SUFFIX,hybgzs.com
ruleset=DIRECT,[]DOMAIN-SUFFIX,elysia.h-e.top
ruleset=DIRECT,[]DOMAIN-SUFFIX,tutunbyy.uk
ruleset=DIRECT,[]DOMAIN-SUFFIX,ghxi.com
ruleset=DIRECT,[]DOMAIN-SUFFIX,lanzog.com
ruleset=DIRECT,[]DOMAIN-SUFFIX,lanosso.com
ruleset=DIRECT,[]DOMAIN-SUFFIX,tool.lu
ruleset=DIRECT,[]DOMAIN-SUFFIX,itab.link
ruleset=DIRECT,[]DOMAIN-SUFFIX,tx.lilyemby.my
ruleset=DIRECT,[]DOMAIN-SUFFIX,cdn.lilyemby.my
ruleset=DIRECT,[]DOMAIN-SUFFIX,lovestu.com

; ---------- 5. DIRECT 规则集 ----------
ruleset=DIRECT,https://gist.githubusercontent.com/yippp/4f87ecc4ecaf4b7594a734ccd13b24fd/raw/ffae8e87f78880c0386c6632ab8f76711447a61a/Scholar.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=DIRECT,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaMedia.list
ruleset=DIRECT,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/LanZouYun/LanZouYun.list

; ---------- 6. IP 规则（下沉到最后，规则表更清晰） ----------
ruleset=DIRECT,[]IP-CIDR,11.102.6.5/32,no-resolve
ruleset=DIRECT,[]IP-CIDR,101.102.103.56/32,no-resolve
ruleset=DIRECT,[]IP-CIDR,1.0.0.1/32,no-resolve
ruleset=DIRECT,[]IP-CIDR6,2606:4700:4700::1111/128,no-resolve
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaIp.list
ruleset=DIRECT,[]GEOIP,CN,no-resolve

; ---------- 7. 兜底 ----------
ruleset=🚀 节点选择,[]FINAL

; ============================================================
;  代理分组（严格 3 个）
;  改动：url-test interval 300 → 600（探测流量减半）
; ============================================================
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`600,,50
custom_proxy_group=🤖 OPenAI`select`[]🚀 节点选择`[]REJECT`.*

enable_rule_generator=true
overwrite_original_rules=true
